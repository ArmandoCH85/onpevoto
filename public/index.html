    <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
  </a>

  <script type="module">
    import { fetchAllData, renderHeader, renderScopeTabs, renderMiniStats, renderVoltereta, renderGeoSection, renderVisitas, getList, getTotales, fmt, fmtPct, fmtPctShort, fmtDiff, fmtDate, photoUrl, partyLogoUrl, setScope, getScope, setSelectedDepto, getSelectedDepto, fetchDeptoResultados } from '/app.js';

    function getConnectorCls(diff) {
      if (diff < 10000) return 'very-close';
      if (diff < 500000) return 'close';
      return '';
    }

    function renderTop3() {
      const list = getList();
      const sorted = [...list].sort((a, b) => (b.porcentajeVotosValidos || 0) - (a.porcentajeVotosValidos || 0));
      const top3 = sorted.slice(0, 3);
      const maxPct = top3[0]?.porcentajeVotosValidos || 1;
      if (!top3.length) { document.getElementById('top3-section').innerHTML = ''; return; }

      const ranks = ['rank-1', 'rank-2', 'rank-3'];
      let html = '<div class="top3-list">';

      top3.forEach((c, i) => {
        const pct = c.porcentajeVotosValidos || 0;
        const barW = maxPct > 0 ? (pct / maxPct * 100) : 0;
        const diff = i > 0 ? (top3[i - 1].totalVotosValidos - c.totalVotosValidos) : null;
        const diffPct = i > 0 ? (top3[i - 1].porcentajeVotosValidos - pct) : null;
        const leadOver2nd = i === 0 && top3[1] ? (c.totalVotosValidos - top3[1].totalVotosValidos) : null;
        const leadPct = i === 0 && top3[1] ? (pct - top3[1].porcentajeVotosValidos) : null;

        html += `
          <div class="candidate-card ${ranks[i]}">
            <div class="card-main">
              <div class="card-photo-wrap">
                <img class="card-photo" src="${photoUrl(c.dniCandidato)}" alt="${c.nombreCandidato}" onerror="this.style.display='none'">
                <div class="card-photo-rank">${i + 1}</div>
              </div>
              <div class="card-identity">
                <div class="card-name">${c.nombreCandidato || c.nombreAgrupacionPolitica}</div>
                <div class="card-party">
                  ${c.nombreAgrupacionPolitica}
                  <img class="card-party-logo" src="${partyLogoUrl(c.codigoAgrupacionPolitica)}" alt="" onerror="this.style.display='none'">
                </div>
              </div>
              <div class="card-pct-wrap">
                <div class="card-pct">${fmtPctShort(pct)}</div>
                <div class="card-pct-label">% validos</div>
              </div>
            </div>
            <div class="card-stats">
              <div class="card-votes-block">
                <div class="card-votes-label">Votos totales</div>
                <div class="card-votes-total">${fmt(c.totalVotosValidos)}</div>
                <div class="card-bar-track"><div class="card-bar-fill" style="width:${barW}%"></div></div>
              </div>
              <div class="card-diff-block">
                ${i === 0 ? `
                  <div class="card-diff-label">Ventaja sobre 2.do</div>
                  <div class="card-diff-value">${leadOver2nd != null ? fmtDiff(leadOver2nd) : '-'}</div>
                  <div class="card-diff-pct">${leadPct != null ? fmtPct(leadPct) + ' pts' : ''}</div>
                ` : `
                  <div class="card-diff-label">Diferencia con ${i}.er lugar</div>
                  <div class="card-diff-value"><span class="diff-arrow">&#9660;</span>${fmtDiff(diff)}</div>
                  <div class="card-diff-pct">${fmtPct(diffPct)} pts</div>
                `}
              </div>
            </div>
          </div>`;

        if (i < top3.length - 1) {
          const nextDiff = c.totalVotosValidos - (top3[i + 1]?.totalVotosValidos || 0);
          const nextDiffPct = pct - (top3[i + 1]?.porcentajeVotosValidos || 0);
          const cls = getConnectorCls(nextDiff);
          html += `
            <div class="diff-connector">
              <div class="diff-connector-inner ${cls}">
                <span class="arrow-down">&#9660;</span>
                <div>
                  <div class="diff-label-text">Diferencia ${i + 1}er vs ${i + 2}do</div>
                  <div class="diff-text">${fmtDiff(nextDiff)} votos</div>
                  <div class="diff-pct-text">${fmtPct(nextDiffPct)} puntos</div>
                </div>
              </div>
            </div>`;
        }
      });

      html += '</div>';
      document.getElementById('top3-section').innerHTML = html;
    }

    function renderRest() {
      const list = getList();
      const sorted = [...list].sort((a, b) => (b.porcentajeVotosValidos || 0) - (a.porcentajeVotosValidos || 0));
      const rest = sorted.slice(3);
      if (!rest.length) { document.getElementById('rest-section').innerHTML = ''; return; }

      const rows = rest.map((c, i) => `
        <div class="rest-row">
          <div class="rest-rank">${i + 4}</div>
          <div><img class="rest-photo" src="${photoUrl(c.dniCandidato)}" alt="" onerror="this.style.display='none'"></div>
          <div class="rest-info"><div class="rest-name">${c.nombreCandidato || c.nombreAgrupacionPolitica}</div><div class="rest-party">${c.nombreAgrupacionPolitica}</div></div>
          <div class="rest-votes">${fmt(c.totalVotosValidos)}</div>
          <div class="rest-pct">${fmtPct(c.porcentajeVotosValidos)}</div>
        </div>`).join('');

      document.getElementById('rest-section').innerHTML = `
        <div class="rest-title">Demas candidaturas (${rest.length})</div>
        <div class="rest-grid">
          <div class="rest-header"><div>#</div><div></div><div>Candidato / Partido</div><div>Votos</div><div>% Validos</div></div>
          ${rows}
        </div>`;
    }

    function renderAll() {
      renderHeader();
      renderScopeTabs('scope-tabs', () => { setSelectedDepto(null); renderAll(); });
      renderMiniStats('summary-row', getTotales());
      renderVoltereta('voltereta-section', getList(), getTotales());
      renderTop3();
      renderRest();
      renderGeoSection('geo-section', handleDeptoSelect);
      renderVisitas('visitas-section');
    }

    async function handleDeptoSelect(ubigeo) {
      if (!ubigeo) {
        setSelectedDepto(null);
        renderAll();
        return;
      }
      const list = await fetchDeptoResultados(ubigeo);
      const candidates = list.filter(c => c.dniCandidato && c.nombreCandidato);
      const sorted = [...candidates].sort((a, b) => (b.porcentajeVotosValidos || 0) - (a.porcentajeVotosValidos || 0));
      const top3 = sorted.slice(0, 3);
      const maxPct = top3[0]?.porcentajeVotosValidos || 1;
      const deptoName = document.getElementById('geo-depto-dropdown')?.selectedOptions[0]?.text || '';

      const ranks = ['rank-1', 'rank-2', 'rank-3'];
      let html = `<button class="geo-back-btn" id="geo-back">&#8592; Ver Nacional</button>`;
      html += '<div class="top3-list">';

      top3.forEach((c, i) => {
        const pct = c.porcentajeVotosValidos || 0;
        const barW = maxPct > 0 ? (pct / maxPct * 100) : 0;
        const diff = i > 0 ? (top3[i - 1].totalVotosValidos - c.totalVotosValidos) : null;
        const diffPct = i > 0 ? (top3[i - 1].porcentajeVotosValidos - pct) : null;
        const leadOver2nd = i === 0 && top3[1] ? (c.totalVotosValidos - top3[1].totalVotosValidos) : null;
        const leadPct = i === 0 && top3[1] ? (pct - top3[1].porcentajeVotosValidos) : null;

        html += `
          <div class="candidate-card ${ranks[i]}">
            <div class="card-main">
              <div class="card-photo-wrap">
                <img class="card-photo" src="${photoUrl(c.dniCandidato)}" alt="${c.nombreCandidato}" onerror="this.style.display='none'">
                <div class="card-photo-rank">${i + 1}</div>
              </div>
              <div class="card-identity">
                <div class="card-name">${c.nombreCandidato || c.nombreAgrupacionPolitica}</div>
                <div class="card-party">
                  ${c.nombreAgrupacionPolitica}
                  <img class="card-party-logo" src="${partyLogoUrl(c.codigoAgrupacionPolitica)}" alt="" onerror="this.style.display='none'">
                </div>
              </div>
              <div class="card-pct-wrap">
                <div class="card-pct">${fmtPctShort(pct)}</div>
                <div class="card-pct-label">% validos</div>
              </div>
            </div>
            <div class="card-stats">
              <div class="card-votes-block">
                <div class="card-votes-label">Votos totales</div>
                <div class="card-votes-total">${fmt(c.totalVotosValidos)}</div>
                <div class="card-bar-track"><div class="card-bar-fill" style="width:${barW}%"></div></div>
              </div>
              <div class="card-diff-block">
                ${i === 0 ? `
                  <div class="card-diff-label">Ventaja sobre 2.do</div>
                  <div class="card-diff-value">${leadOver2nd != null ? fmtDiff(leadOver2nd) : '-'}</div>
                  <div class="card-diff-pct">${leadPct != null ? fmtPct(leadPct) + ' pts' : ''}</div>
                ` : `
                  <div class="card-diff-label">Diferencia con ${i}.er lugar</div>
                  <div class="card-diff-value"><span class="diff-arrow">&#9660;</span>${fmtDiff(diff)}</div>
                  <div class="card-diff-pct">${fmtPct(diffPct)} pts</div>
                `}
              </div>
            </div>
          </div>`;

        if (i < top3.length - 1) {
          const nextDiff = c.totalVotosValidos - (top3[i + 1]?.totalVotosValidos || 0);
          const nextDiffPct = pct - (top3[i + 1]?.porcentajeVotosValidos || 0);
          const cls = getConnectorCls(nextDiff);
          html += `
            <div class="diff-connector">
              <div class="diff-connector-inner ${cls}">
                <span class="arrow-down">&#9660;</span>
                <div>
                  <div class="diff-label-text">Diferencia ${i + 1}er vs ${i + 2}do</div>
                  <div class="diff-text">${fmtDiff(nextDiff)} votos</div>
                  <div class="diff-pct-text">${fmtPct(nextDiffPct)} puntos</div>
                </div>
              </div>
            </div>`;
        }
      });

      html += '</div>';
      const section = document.getElementById('top3-section');
      section.innerHTML = `<div style="text-align:center;font-size:0.85rem;font-weight:700;color:var(--onpe-blue);margin-bottom:1rem">Resultados en ${deptoName}</div>` + html;
      document.getElementById('rest-section').innerHTML = '';

      document.getElementById('geo-back').addEventListener('click', () => {
        setSelectedDepto(null);
        document.getElementById('geo-depto-dropdown').value = '';
        renderAll();
      });
    }

    async function init() {
      document.getElementById('app-loading').style.display = 'flex';
      document.getElementById('app-error').style.display = 'none';
      document.getElementById('app-content').style.display = 'none';
      try {
        await fetchAllData();
        renderAll();
        document.getElementById('app-loading').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
      } catch (e) {
        document.getElementById('app-loading').style.display = 'none';
        document.getElementById('app-error').style.display = 'block';
        document.getElementById('app-error-msg').textContent = e.message;
      }
    }

    init();
    setInterval(init, 5 * 60 * 1000);
  </script>
</body>
