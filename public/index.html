      cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 0.35rem;
      transition: all 0.2s; background: #0a0a0a; color: rgba(255,255,255,0.6);
    }
    .share-btn:hover { color: white; border-color: rgba(255,255,255,0.3); transform: translateY(-1px); }
    .share-btn:focus-visible { outline: 3px solid var(--onpe-blue); outline-offset: 2px; }
    .share-copy:hover { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.08); }
    .share-wa:hover { border-color: #25D367; color: #25D367; background: rgba(37,211,102,0.1); }
    .share-tw:hover { border-color: #1DA1F2; color: #1DA1F2; background: rgba(29,161,242,0.1); }
    .share-img:hover { border-color: #C41E3A; color: #C41E3A; background: rgba(196,30,58,0.1); }

    /* ── Responsive ──────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .duel-hero-grid { grid-template-columns: 1fr; gap: 1rem; }
      .duel-hero-vs { flex-direction: row; padding: 0.5rem 0; }
      .dhvs-circle { width: 40px; height: 40px; font-size: 1rem; }
      .dhvs-gap { display: flex; align-items: center; gap: 0.5rem; margin-top: 0; }
      .dhvs-gap-value { font-size: 1rem; }
      .dhc-pct { font-size: 2rem; }
      .dhc-photo { width: 64px; height: 64px; }
      .first-strip { flex-wrap: wrap; }
      .fs-pct { font-size: 1.3rem; }
    }
    @media (max-width: 640px) {
      .ticker-text { font-size: 0.72rem; }
      .duel-hero { padding: 1.25rem 1rem 1rem; }
      .dhc-photo { width: 56px; height: 56px; }
      .dhc-name { font-size: 0.85rem; }
      .dhc-pct { font-size: 1.8rem; }
      .dhvs-circle { width: 36px; height: 36px; font-size: 0.9rem; }
      .first-strip { padding: 0.75rem 1rem; }
      .fs-photo { width: 36px; height: 36px; }
      .fs-name { font-size: 0.82rem; }
      .fs-pct { font-size: 1.1rem; }
      .visitas-widget { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
      .visitas-count { border-right: none; padding-right: 0; border-bottom: 1px solid var(--gray-200); padding-bottom: 0.5rem; width: 100%; flex-direction: row; justify-content: center; gap: 0.5rem; }
      .share-bar { gap: 0.4rem; }
      .share-btn { font-size: 0.68rem; padding: 0.4rem 0.7rem; }
      .geo-table-header { display: none; }
      .geo-table { border: none; border-radius: 0; }
      .geo-row { display: flex; flex-wrap: wrap; align-items: center; gap: 0.4rem 0.6rem; padding: 0.6rem 0.5rem; font-size: 0.75rem; }
      .geo-row > div { padding: 0; }
      .geo-depto-name { font-size: 0.8rem; font-weight: 700; flex: 0 0 100%; }
      .geo-winner { gap: 0.3rem; }
      .geo-winner-photo { width: 24px; height: 24px; border-radius: 5px; }
      .geo-winner-name { font-size: 0.7rem; }
      .geo-winner-pct { font-size: 0.65rem; }
      .geo-2nd, .geo-3rd { font-size: 0.65rem; }
      .geo-diff { font-size: 0.7rem; margin-left: auto; }
      .geo-depto-select select { max-width: 100%; }
      .rest-grid { display: flex; flex-direction: column; gap: 0; border: none; border-radius: 0; background: none; }
      .rest-header { display: none; }
      .rest-row { display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem; padding: 0.6rem 0.5rem; border-bottom: 1px solid var(--gray-200); background: white; }
      .rest-row > div { padding: 0; }
      .rest-rank { font-size: 0.75rem; width: 24px; }
      .rest-photo { width: 32px; height: 32px; border-radius: 6px; }
      .rest-info { flex: 1; min-width: 0; }
      .rest-name { font-size: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .rest-party { display: none; }
      .rest-votes { font-size: 0.7rem; }
      .rest-pct { font-size: 0.8rem; }
    }
  </style>
</head>
<body>
  <!-- Section 1: Ticker Alert Bar -->
  <div class="ticker-bar">
    <div class="ticker-badge">EN VIVO</div>
    <div class="ticker-scroll">
      <div class="ticker-text" id="ticker-text"></div>
    </div>
  </div>

  <header class="app-header" id="app-header"></header>

  <div class="app-container">
    <div class="app-loading" id="app-loading">
      <div class="spinner"></div>
      <div>Cargando resultados...</div>
    </div>

    <div class="app-error" id="app-error" style="display:none">
      <h2>Error al cargar datos</h2>
      <p id="app-error-msg"></p>
      <button class="retry-btn" onclick="init()">Reintentar</button>
    </div>

    <div id="app-content" style="display:none">
      <!-- CTA Pill -->
      <div class="cta-pill" id="cta-pill"></div>

      <!-- Scope tabs -->
      <div id="scope-tabs"></div>

      <!-- Mini stats -->
      <div class="mini-stats-row" id="summary-row"></div>

      <!-- Voltereta -->
      <div id="voltereta-section"></div>

      <!-- Section 2: Duel Cards -->
      <section class="duel-section" id="duel-section"></section>

      <!-- Share bar -->
      <div id="share-section"></div>

      <!-- Rest of candidates -->
      <div class="rest-section" id="rest-section"></div>

      <!-- Geo section -->
      <div id="geo-section"></div>

      <!-- Visitas -->
      <div id="visitas-section"></div>
    </div>
  </div>

  <footer class="app-footer">
    Datos de <a href="https://resultadoelectoral.onpe.gob.pe/main/presidenciales" target="_blank">resultadoelectoral.onpe.gob.pe</a>
  </footer>

  <a class="whatsapp-float" href="https://wa.me/51914550223" target="_blank" rel="noopener" aria-label="Contactar por WhatsApp">
    <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
  </a>

  <script type="module">
    import { fetchAllData, renderHeader, renderScopeTabs, renderMiniStats, renderVoltereta, renderGeoSection, renderVisitas, renderShareBar, getList, getTotales, fmt, fmtPct, fmtPctShort, fmtDiff, fmtDate, photoUrl, partyLogoUrl, setScope, getScope, setSelectedDepto, getSelectedDepto, fetchDeptoResultados } from '/app.js';

    function renderTicker(list, t) {
      if (!list.length || !t) return;
      const sorted = [...list].sort((a, b) => (b.porcentajeVotosValidos || 0) - (a.porcentajeVotosValidos || 0));
      const top3 = sorted.slice(0, 3);
      const pct = Number(t.actasContabilizadas) || 0;
      const items = [
        `<span>Resultados ONPE act</span>`,
        `${top3.map(c => `<span class="t-highlight">${c.nombreCandidato?.split(' ').slice(0,2).join(' ')}</span> <span class="t-pct">${fmtPctShort(c.porcentajeVotosValidos)}%</span>`).join('<span class="t-dot">•</span>')}`,
        `<span>${fmtPctShort(pct)}% contabilizado</span>`,
        `<span class="t-highlight">${fmt(t.totalVotosEmitidos)}</span> <span class="t-pct">votos emitidos</span>`,
      ];
      const text = items.join('');
      const el = document.getElementById('ticker-text');
      if (el) el.innerHTML = text + ' ' + text;
    }

    function renderCTA() {
      const el = document.getElementById('cta-pill');
      el.innerHTML = `<a href="/proyecciones.html" class="cta-pill-inner"><svg viewBox="0 0 24 24"><path d="M13 7h-2v4H7v2h4v4h2v-4h4v-2h-4V7zm-1-5C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>Puede cambiar el 2do o 3er lugar? Mira las proyecciones…</a>`;
    }

    function renderTop3() {
      const list = getList();
      const sorted = [...list].sort((a, b) => (b.porcentajeVotosValidos || 0) - (a.porcentajeVotosValidos || 0));
      const top3 = sorted.slice(0, 3);
      if (!top3.length) { document.getElementById('duel-section').innerHTML = ''; return; }

      const first = top3[0];
      const second = top3[1];
      const third = top3[2];

      // HERO: 2nd vs 3rd is THE main event
      let html = '';

      if (second && third) {
        const diff23 = second.totalVotosValidos - third.totalVotosValidos;
        const diff23Pct = second.porcentajeVotosValidos - third.porcentajeVotosValidos;
        const isClose = Math.abs(diff23Pct) < 2;
        const secondPctShared = second.porcentajeVotosValidos + third.porcentajeVotosValidos > 0
          ? (second.porcentajeVotosValidos / (second.porcentajeVotosValidos + third.porcentajeVotosValidos) * 100) : 50;
        const thirdPctShared = 100 - secondPctShared;

        html += `
        <div class="duel-hero ${isClose ? 'duel-hero-close' : ''}">
          <div class="duel-hero-label">${isClose ? '&#128293; PELEA CERRADA' : 'La pelea por el 2do lugar'}</div>
          <div class="duel-hero-grid">
            <div class="duel-hero-card duel-hero-card-2">
              <div class="dhc-badge">2do</div>
              <img class="dhc-photo" src="${photoUrl(second.dniCandidato)}" alt="" onerror="this.style.display='none'">
              <img class="dhc-party-logo" src="${partyLogoUrl(second.codigoAgrupacionPolitica)}" alt="" onerror="this.style.display='none'">
              <div class="dhc-name">${second.nombreCandidato || second.nombreAgrupacionPolitica}</div>
              <div class="dhc-party">${second.nombreAgrupacionPolitica}</div>
              <div class="dhc-pct">${fmtPctShort(second.porcentajeVotosValidos)}</div>
              <div class="dhc-bar-track"><div class="dhc-bar-fill dhc-bar-silver" style="width:${secondPctShared}%"></div></div>
              <div class="dhc-votes">${fmt(second.totalVotosValidos)} votos</div>
            </div>

            <div class="duel-hero-vs">
              <div class="dhvs-circle">VS</div>
              <div class="dhvs-gap">
                <div class="dhvs-gap-value">${fmtDiff(diff23)}</div>
                <div class="dhvs-gap-label">votos de diferencia</div>
                <div class="dhvs-gap-pct">${fmtPct(Math.abs(diff23Pct))} pts</div>
              </div>
            </div>

            <div class="duel-hero-card duel-hero-card-3">
              <div class="dhc-badge">3ro</div>
              <img class="dhc-photo" src="${photoUrl(third.dniCandidato)}" alt="" onerror="this.style.display='none'">
              <img class="dhc-party-logo" src="${partyLogoUrl(third.codigoAgrupacionPolitica)}" alt="" onerror="this.style.display='none'">
              <div class="dhc-name">${third.nombreCandidato || third.nombreAgrupacionPolitica}</div>
              <div class="dhc-party">${third.nombreAgrupacionPolitica}</div>
              <div class="dhc-pct">${fmtPctShort(third.porcentajeVotosValidos)}</div>
              <div class="dhc-bar-track"><div class="dhc-bar-fill dhc-bar-bronze" style="width:${thirdPctShared}%"></div></div>
              <div class="dhc-votes">${fmt(third.totalVotosValidos)} votos</div>
            </div>
          </div>
        </div>`;
      }

      // 1st place: compact strip below
      html += `
      <div class="first-strip">
        <div class="fs-rank">1</div>
        <img class="fs-photo" src="${photoUrl(first.dniCandidato)}" alt="" onerror="this.style.display='none'">
        <div class="fs-info">
          <div class="fs-name">${first.nombreCandidato || first.nombreAgrupacionPolitica}</div>
          <div class="fs-party">${first.nombreAgrupacionPolitica} · ${fmt(first.totalVotosValidos)} votos</div>
        </div>
        <div class="fs-pct">${fmtPctShort(first.porcentajeVotosValidos)}</div>
        ${second ? `<div class="fs-lead">&#9650; ${fmtPct(first.porcentajeVotosValidos - second.porcentajeVotosValidos)} pts de ventaja</div>` : ''}
      </div>`;

      document.getElementById('duel-section').innerHTML = html;
    }

    function renderRest() {
      const list = getList();
      const sorted = [...list].sort((a, b) => (b.porcentajeVotosValidos || 0) - (a.porcentajeVotosValidos || 0));
      const rest = sorted.slice(3);
      if (!rest.length) { document.getElementById('rest-section').innerHTML = ''; return; }

      const rows = rest.map((c, i) => `
        <div class="rest-row">
          <div class="rest-rank">${i + 4}</div>
          <div><img class="rest-photo" src="${photoUrl(c.dniCandidato)}" alt="" onerror="this.style.display='none'"></div>
          <div class="rest-info"><div class="rest-name">${c.nombreCandidato || c.nombreAgrupacionPolitica}</div><div class="rest-party">${c.nombreAgrupacionPolitica}</div></div>
          <div class="rest-votes">${fmt(c.totalVotosValidos)}</div>
          <div class="rest-pct">${fmtPct(c.porcentajeVotosValidos)}</div>
        </div>`).join('');

      document.getElementById('rest-section').innerHTML = `
        <div class="rest-title">Demas candidaturas (${rest.length})</div>
        <div class="rest-grid">
          <div class="rest-header"><div>#</div><div></div><div>Candidato / Partido</div><div>Votos</div><div>% Validos</div></div>
          ${rows}
        </div>`;
    }

    function renderAll() {
      const list = getList();
      const t = getTotales();
      renderHeader();
      renderTicker(list, t);
      renderCTA();
      renderScopeTabs('scope-tabs', () => { setSelectedDepto(null); renderAll(); });
      renderMiniStats('summary-row', t);
      renderVoltereta('voltereta-section', list, t);
      renderTop3();
      renderShareBar('share-section', list);
      renderRest();
      renderGeoSection('geo-section', handleDeptoSelect);
      renderVisitas('visitas-section');
    }

    async function handleDeptoSelect(ubigeo) {
      if (!ubigeo) { setSelectedDepto(null); renderAll(); return; }
      const list = await fetchDeptoResultados(ubigeo);
      const candidates = list.filter(c => c.dniCandidato && c.nombreCandidato);
      const sorted = [...candidates].sort((a, b) => (b.porcentajeVotosValidos || 0) - (a.porcentajeVotosValidos || 0));
      const top3 = sorted.slice(0, 3);
      const deptoName = document.getElementById('geo-depto-dropdown')?.selectedOptions[0]?.text || '';

      const section = document.getElementById('duel-section');
      section.innerHTML = `<div style="text-align:center;font-size:0.85rem;font-weight:700;color:var(--onpe-blue);margin-bottom:1rem">Resultados en ${deptoName}</div>`;
      document.getElementById('rest-section').innerHTML = '';

      document.getElementById('geo-back')?.addEventListener('click', () => { setSelectedDepto(null); document.getElementById('geo-depto-dropdown').value = ''; renderAll(); });
    }

    async function init() {
      document.getElementById('app-loading').style.display = 'flex';
      document.getElementById('app-error').style.display = 'none';
      document.getElementById('app-content').style.display = 'none';
      try {
        await fetchAllData();
        renderAll();
        document.getElementById('app-loading').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
      } catch (e) {
        document.getElementById('app-loading').style.display = 'none';
        document.getElementById('app-error').style.display = 'block';
        document.getElementById('app-error-msg').textContent = e.message;
      }
    }

    init();
    setInterval(init, 5 * 60 * 1000);
  </script>
</body>
</html>
